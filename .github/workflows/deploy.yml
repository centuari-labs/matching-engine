name: Build & Deploy matching-engine

on:
  push:
    branches: [staging, testnet]
  workflow_dispatch:

concurrency:
  group: deploy-matching-engine-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-env:
    runs-on: [self-hosted, centuari-runner]
    outputs:
      env: ${{ steps.set.outputs.env }}
      namespace: ${{ steps.set.outputs.namespace }}
      compose_cmd: ${{ steps.set.outputs.compose_cmd }}
    steps:
      - id: set
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          case "$REF_NAME" in
            staging)
              echo "env=staging" >> $GITHUB_OUTPUT
              echo "namespace=centuari-staging" >> $GITHUB_OUTPUT
              echo "compose_cmd=docker compose -f compose.staging.yml -p centuari-staging" >> $GITHUB_OUTPUT
              ;;
            testnet)
              echo "env=testing" >> $GITHUB_OUTPUT
              echo "namespace=centuari-testing" >> $GITHUB_OUTPUT
              echo "compose_cmd=docker compose -f compose.testing.yml -p centuari-testing" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unknown branch $REF_NAME" >&2
              exit 1
              ;;
          esac

  test:
    needs: detect-env
    runs-on: [self-hosted, centuari-runner]
    timeout-minutes: 15
    env:
      REDIS_URL: redis://127.0.0.1:6379
      NATS_URL: nats://127.0.0.1:4222
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Flush Redis (clean state)
        run: docker exec ci-redis redis-cli FLUSHALL

      - name: Unit tests (exclude integration tests requiring Postgres)
        run: |
          pnpm exec jest \
            --silent \
            --testPathIgnorePatterns=integration \
            --forceExit \
            --detectOpenHandles \
            --testTimeout=10000 \
            --maxWorkers=2

  build-and-deploy:
    needs: [detect-env, test]
    runs-on: [self-hosted, centuari-runner]
    timeout-minutes: 20
    environment: ${{ needs.detect-env.outputs.env }}
    env:
      NAMESPACE: ${{ needs.detect-env.outputs.namespace }}
      IMAGE_NAME: ${{ needs.detect-env.outputs.namespace }}/matching-engine
      REGISTRY: localhost:5000
      COMPOSE_CMD: ${{ needs.detect-env.outputs.compose_cmd }}
      ENV_SUFFIX: -${{ needs.detect-env.outputs.env }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Cleanup any leftover SSH tunnel
        run: |
          pkill -f "ssh.*-L 5000:127.0.0.1:5000" || true
          sleep 1

      - name: Open SSH tunnel to registry
        run: |
          ssh -f -N -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            -o ExitOnForwardFailure=yes \
            -L 5000:127.0.0.1:5000 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          sleep 2
          curl -sf http://localhost:5000/v2/ > /dev/null

      - name: Tag & push to registry
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Close SSH tunnel
        if: always()
        run: pkill -f "ssh.*-L 5000:127.0.0.1:5000" || true

      - name: Deploy to VPS
        # Force-remove containers by name first, in case they were created with a
        # different compose project label (legacy bootstrap). Otherwise compose -p
        # cannot manage them and `up -d` errors with "name already in use".
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ~/centuari && \
             docker rm -f centuari-${{ needs.detect-env.outputs.env }}-matching-engine centuari-${{ needs.detect-env.outputs.env }}-matching-engine-db-writer 2>/dev/null || true && \
             ${{ env.COMPOSE_CMD }} pull matching-engine${{ env.ENV_SUFFIX }} matching-engine-db-writer${{ env.ENV_SUFFIX }} && \
             ${{ env.COMPOSE_CMD }} up -d --no-deps matching-engine${{ env.ENV_SUFFIX }} matching-engine-db-writer${{ env.ENV_SUFFIX }} && \
             docker image prune -f"

      - name: Cleanup local images
        if: always()
        run: |
          docker image rm ${{ env.IMAGE_NAME }}:${{ github.sha }} || true
          docker image rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} || true
